<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="mb-8">
      <h1 class="text-2xl font-medium tracking-tight text-gray-900">fintrack</h1>
      <p class="text-sm text-gray-500 mt-1">Controle financeiro pessoal</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

      <div>
        <label class="block text-xs text-gray-500 mb-1">E-mail</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-gray-400 transition-colors"
          placeholder="seu@email.com"
        />
        <p *ngIf="email?.invalid && email?.touched" class="text-xs text-red-500 mt-1">
          E-mail inválido
        </p>
      </div>

      <div>
        <label class="block text-xs text-gray-500 mb-1">Senha</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-gray-400 transition-colors"
          placeholder="••••••"
        />
        <p *ngIf="password?.invalid && password?.touched" class="text-xs text-red-500 mt-1">
          Mínimo 6 caracteres
        </p>
      </div>

      <p *ngIf="error" class="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg">
        {{ error }}
      </p>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-2 text-sm font-medium bg-gray-900 text-white rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50"
      >
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

    </form>

    <p class="text-xs text-gray-500 text-center mt-6">
      Não tem conta?
      <a routerLink="/register" class="text-gray-900 underline">Cadastre-se</a>
    </p>

  </div>
</div>
