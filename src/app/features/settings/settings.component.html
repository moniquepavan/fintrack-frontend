<div class="min-h-screen bg-gray-50">
  <header class="bg-white border-b border-gray-100 px-6 py-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <a routerLink="/dashboard" class="text-lg font-medium tracking-tight text-gray-900 hover:text-gray-600 transition-colors">fintrack</a>
      <div class="flex items-center gap-1">
        <a routerLink="/dashboard" class="text-sm px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">Dashboard</a>
        <a routerLink="/transactions" class="text-sm px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">Transações</a>
        <a routerLink="/categories" class="text-sm px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">Categorias</a>
        <a routerLink="/payment-methods" class="text-sm px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">Pagamentos</a>
        <a routerLink="/cards" class="text-sm px-3 py-1.5 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">Cartões</a>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500">{{ user?.name }}</span>
        <button (click)="logout()" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Sair</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">
    <div class="mb-6">
      <h2 class="text-base font-medium text-gray-900">Configurações</h2>
      <p class="text-xs text-gray-400 mt-0.5">{{ user?.email }}</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 p-5 max-w-sm">
      <h3 class="text-sm font-medium text-gray-700 mb-4">Alterar senha</h3>

      <div *ngIf="success" class="text-xs text-green-700 bg-green-50 px-3 py-2 rounded-lg mb-4">
        Senha alterada com sucesso. Redirecionando para o login...
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Senha atual</label>
          <input type="password" formControlName="currentPassword"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-gray-400" />
          <p *ngIf="currentPassword?.invalid && currentPassword?.touched" class="text-xs text-red-500 mt-1">
            Informe a senha atual
          </p>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1">Nova senha</label>
          <input type="password" formControlName="newPassword"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-gray-400" />
          <p *ngIf="newPassword?.invalid && newPassword?.touched" class="text-xs text-red-500 mt-1">
            Mínimo 6 caracteres
          </p>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1">Confirmar nova senha</label>
          <input type="password" formControlName="confirmPassword"
            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-gray-400" />
          <p *ngIf="form.errors?.['mismatch'] && confirmPassword?.touched" class="text-xs text-red-500 mt-1">
            As senhas não coincidem
          </p>
        </div>

        <p *ngIf="error" class="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg">{{ error }}</p>

        <button type="submit" [disabled]="submitting || form.invalid"
          class="w-full py-2 text-sm font-medium bg-gray-900 text-white rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-50">
          {{ submitting ? 'Salvando...' : 'Alterar senha' }}
        </button>
      </form>
    </div>
  </main>
</div>
